{%- assign _user = include.user | default: site.author.email_user -%}
{%- assign _domain = include.domain | default: site.author.email_domain -%}
{%- assign _uid = _user | append: _domain | slugify -%}
<span class="obfuscated-email" id="oe-{{ _uid }}" data-user="{{ _user }}" data-domain="{{ _domain }}"{% if include.label %} data-label="{{ include.label }}"{% endif %}{% if include.icon %} data-icon="{{ include.icon }}"{% endif %}>{{ _user }}&#32;[at]&#32;{{ _domain }}</span>
<script>
(function () {
  var el = document.getElementById("oe-{{ _uid }}");
  if (!el) return;
  var addr = el.getAttribute("data-user") + "@" + el.getAttribute("data-domain");
  var a = document.createElement("a");
  a.href = "mailto:" + addr;
  {% if include.class %}a.className = "{{ include.class }}";{% endif %}
  var icon = el.getAttribute("data-icon");
  if (icon) {
    var i = document.createElement("i");
    i.className = icon;
    i.setAttribute("aria-hidden", "true");
    a.appendChild(i);
  }
  a.appendChild(document.createTextNode(el.getAttribute("data-label") || addr));
  el.replaceWith(a);
})();
</script>
